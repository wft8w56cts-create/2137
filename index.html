<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21:37</title>
    
    <!-- Ładujemy biblioteki do odtwarzania prawdziwych plików .mid -->
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/dist/magentamusic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-midi-player@1.5.0/dist/midi-player.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFD700; /* Klasyczna żółć */
            color: #222;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            cursor: pointer; /* Cały ekran działa jako przycisk aktywacji audio */
        }

        #counter {
            font-size: 12vw;
            font-weight: bold;
            text-align: center;
        }

        /* Ukrywamy odtwarzacz – zero przycisków na ekranie */
        midi-player {
            display: none;
        }
    </style>
</head>
<body>

    <div id="counter">00:00:00</div>

    <!-- Prawdziwy plik MIDI z Barką -->
    <midi-player 
        id="barkaPlayer" 
        src="https://raw.githubusercontent.com/w0w_g/barka-midi/main/barka.mid">
    </midi-player>

    <script>
        let audioUnlocked = false;
        const player = document.getElementById('barkaPlayer');
        let barkaPlayingThisMinute = false;

        // Pierwsze kliknięcie użytkownika w dowolne miejsce odblokowuje audio w przeglądarce
        window.addEventListener('click', () => {
            if (!audioUnlocked) {
                player.start();
                setTimeout(() => player.stop(), 50);
                audioUnlocked = true;
                console.log("Audio zostało pomyślnie uzbrojone.");
            }
        });

        function updateClock() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentSecond = now.getSeconds();

            const counterElement = document.getElementById('counter');

            // Sprawdzamy czy jest godzina XXI:XXXVII
            if (currentHour === 21 && currentMinute === 37) {
                counterElement.innerText = "2137";
                
                // Odpalamy Barkę dokładnie w pierwszej sekundzie tej minuty
                if (!barkaPlayingThisMinute) {
                    if (audioUnlocked) {
                        player.start();
                        barkaPlayingThisMinute = true;
                    } else {
                        console.log("Wybbiła 21:37, ale zapomniałeś kliknąć w tło, żeby odblokować audio!");
                    }
                }
                return;
            }

            // Jeśli minęła minuta papieska (jest 21:38), wyłączamy odtwarzacz i resetujemy flagę
            if (barkaPlayingThisMinute && (currentHour !== 21 || currentMinute !== 37)) {
                player.stop();
                barkaPlayingThisMinute = false;
            }

            // Obliczanie czasu do najbliższej godziny 21:37
            let target = new Date();
            target.setHours(21, 37, 0, 0);

            // Jeśli dzisiejsza 21:37 już minęła, odliczamy do jutra
            if (now > target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const pad = (num) => String(num).padStart(2, '0');
            counterElement.innerText = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        }

        // Odświeżanie zegara co sekundę
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
