<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 21:37 - Prawdziwa Barka</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/dist/magentamusic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-midi-player@1.5.0/dist/midi-player.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #FFD700; /* Klasyczna żółć */
            color: #222;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        #counter {
            font-size: 12vw;
            font-weight: bold;
            text-align: center;
        }

        /* Ukrywamy sam odtwarzacz, żeby nie było żadnych przycisków */
        midi-player {
            display: none;
        }
    </style>
</head>
<body>

    <div id="counter">00:00:05</div>

    <midi-player 
        id="barkaPlayer" 
        src="https://raw.githubusercontent.com/w0w_g/barka-midi/main/barka.mid">
    </midi-player>

    <script>
        let audioUnlocked = false;
        const player = document.getElementById('barkaPlayer');

        // Odliczanie testowe: 5 sekund od wejścia
        const testDurationSeconds = 5;
        const targetTime = new Date().getTime() + (testDurationSeconds * 1000);

        // Kliknięcie w dowolne miejsce odblokowuje audio i ładuje odtwarzacz
        window.addEventListener('click', () => {
            if (!audioUnlocked) {
                // Krótkie odtworzenie i pauza, żeby przeglądarka "zezwoliła" na dźwięk
                player.start();
                setTimeout(() => player.stop(), 50);
                audioUnlocked = true;
                console.log("Audio gotowe do ostatecznego odpalenia!");
            }
        });

        let barkaPlayed = false;

        function updateClock() {
            const now = new Date().getTime();
            const diff = targetTime - now;
            const counterElement = document.getElementById('counter');

            if (diff <= 0) {
                counterElement.innerText = "2137";
                
                if (!barkaPlayed) {
                    if (audioUnlocked) {
                        player.start(); // Odpala prawdziwe MIDI
                        barkaPlayed = true;
                    } else {
                        console.log("Kliknij w żółte tło, żeby odblokować muzykę!");
                    }
                }
                return;
            }

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            const pad = (num) => String(num).padStart(2, '0');
            counterElement.innerText = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
